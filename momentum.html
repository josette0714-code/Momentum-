function generatePrint(events, tasks) {
  const now     = new Date();
  const dateStr = now.toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  // Group events by date
  const grouped = groupByDate(events);

  // Group tasks by list
  const tasksByList = LISTS.map(list => ({
    ...list,
    pending:   tasks.filter(t => t.list === list.id && !t.done),
    completed: tasks.filter(t => t.list === list.id && t.done),
  }));

  const eventsHTML = grouped.length === 0
    ? '<p style="color:#888;font-style:italic">No upcoming events.</p>'
    : grouped.map(([d, evs]) => `
        <div class="day-block">
          <div class="day-heading">${fmtDayFull(d)}${isToday(d) ? ' <span class="today-badge">Today</span>' : ''}</div>
          ${evs.map(ev => {
            const c = CAT[ev.cat] || CAT.personal;
            const time = ev.allDay ? 'All day' : (fmtTime(ev.start) + (fmtTime(ev.end) ? ' → ' + fmtTime(ev.end) : ''));
            return `
              <div class="event-row">
                <div class="event-cat" style="background:${c.color}"></div>
                <div class="event-body">
                  <div class="event-title">${ev.title}</div>
                  ${ev.location ? `<div class="event-meta">📍 ${ev.location}</div>` : ''}
                </div>
                <div class="event-time">${time}</div>
              </div>`;
          }).join('')}
        </div>`
    ).join('');

  const tasksHTML = tasksByList.map(list => {
    if (list.pending.length === 0 && list.completed.length === 0) return '';
    return `
      <div class="list-block">
        <div class="list-heading" style="border-left:4px solid ${list.color}">
          ${list.icon} ${list.label}
          <span class="list-count">${list.pending.length} pending · ${list.completed.length} done</span>
        </div>
        ${list.pending.map(t => `
          <div class="task-row">
            <div class="task-check">○</div>
            <div class="task-body">
              <div class="task-title">${t.title}</div>
              ${t.due ? `<div class="task-due">Due ${new Date(t.due+'T12:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}</div>` : ''}
            </div>
          </div>`).join('')}
        ${list.completed.length > 0 ? `
          <div class="completed-heading">Completed</div>
          ${list.completed.map(t => `
            <div class="task-row done">
              <div class="task-check">✓</div>
              <div class="task-body">
                <div class="task-title">${t.title}</div>
              </div>
            </div>`).join('')}
        ` : ''}
      </div>`;
  }).join('');

  const html = `<!DOCTYPE html>

// ── Robust storage: localStorage + sessionStorage + cookie fallbacks ──────────
function saveClientIdStorage(id) {
try { localStorage.setItem(‘momentum_client_id’, id); } catch(e) {}
try { sessionStorage.setItem(‘momentum_client_id’, id); } catch(e) {}
try { document.cookie = ‘momentum_cid=’+encodeURIComponent(id)+’;max-age=31536000;path=/;SameSite=Lax’; } catch(e) {}
}
function loadClientIdStorage() {
try { const v=localStorage.getItem(‘momentum_client_id’); if(v) return v; } catch(e) {}
try { const v=sessionStorage.getItem(‘momentum_client_id’); if(v) return v; } catch(e) {}
try { const m=document.cookie.match(/momentum_cid=([^;]+)/); if(m) return decodeURIComponent(m[1]); } catch(e) {}
return ‘’;
}

<script type="text/babel">
const { useState, useReducer, useRef, useEffect, useCallback } = React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';
const CAL_API = 'https://www.googleapis.com/calendar/v3/calendars/primary/events';

const LISTS = [
  { id:'personal',   label:'Personal',         icon:'👤', color:'#f59e0b', bg:'#fef3c7', dark:'#92400e' },
  { id:'kids',       label:'Kids',             icon:'🧒', color:'#10b981', bg:'#d1fae5', dark:'#065f46' },
  { id:'christmas',  label:'Christmas Wonder', icon:'🎄', color:'#ef4444', bg:'#fee2e2', dark:'#991b1b' },
  { id:'property',   label:'Property',         icon:'🏡', color:'#0ea5e9', bg:'#e0f2fe', dark:'#0c4a6e' },
  { id:'investment', label:'Investment',       icon:'📈', color:'#8b5cf6', bg:'#ede9fe', dark:'#4c1d95' },
  { id:'work',       label:'Work',             icon:'💼', color:'#64748b', bg:'#f1f5f9', dark:'#1e293b' },
];

const CAT = {
  travel:   { color:'#0ea5e9', bg:'#e0f2fe', icon:'✈️',  label:'Travel'   },
  work:     { color:'#8b5cf6', bg:'#ede9fe', icon:'💼',  label:'Work'     },
  health:   { color:'#10b981', bg:'#d1fae5', icon:'🏥',  label:'Health'   },
  social:   { color:'#f59e0b', bg:'#fef3c7', icon:'🍽️', label:'Social'   },
  personal: { color:'#ec4899', bg:'#fce7f3', icon:'🏠',  label:'Personal' },
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function detectCat(title) {
  const t = (title || '').toLowerCase();
  if (/flight|trip|travel|holiday|vacation/.test(t))                          return 'travel';
  if (/\bdr\b|doctor|\bgp\b|clinic|hospital|physio|\bpt\b|dentist|nurse|medical|health|appt/.test(t)) return 'health';
  if (/work|meeting|\bcall\b|zoom|teams|review|conference|seminar|forum|workshop|training/.test(t)) return 'work';
  if (/dinner|lunch|breakfast|party|birthday|drinks|\bbbq\b|coffee|brunch|catch up/.test(t)) return 'social';
  return 'personal';
}

function dateKey(iso) { return (iso||'').length===10 ? iso : (iso||'').slice(0,10); }

function fmtTime(iso) {
  if (!iso || iso.length===10) return '';
  try { return new Date(iso).toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit',hour12:true}); }
  catch(e){ return ''; }
}

function fmtDayFull(iso) {
  try { return new Date(iso+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'}); }
  catch(e){ return iso; }
}

function fmtShort(d) {
  try { return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
  catch(e){ return ''; }
}

function isToday(iso) { return iso===new Date().toISOString().slice(0,10); }

function fmtDue(iso) {
  if (!iso) return null;
  try {
    const d=new Date(iso+'T12:00:00'), t=new Date(); t.setHours(0,0,0,0);
    const diff=Math.floor((d-t)/86400000);
    if(diff<0)  return {label:'Overdue',      color:'#ef4444'};
    if(diff===0) return {label:'Due today',   color:'#f59e0b'};
    if(diff===1) return {label:'Due tomorrow',color:'#f59e0b'};
    return {label:'Due '+d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}),color:'#78716c'};
  } catch(e){ return null; }
}

function getWeekRange(offset) {
  const today=new Date(), dow=today.getDay();
  const daysToMon = dow===0 ? -6 : 1-dow;
  const mon=new Date(today); mon.setDate(today.getDate()+daysToMon+offset*7); mon.setHours(0,0,0,0);
  const sun=new Date(mon);   sun.setDate(mon.getDate()+6);                    sun.setHours(23,59,59,999);
  return {start:mon, end:sun};
}

function filterByWeek(events, offset) {
  const {start,end}=getWeekRange(offset);
  return events.filter(ev => {
    try {
      const iso=ev.start, d=new Date(iso.length===10 ? iso+'T00:00:00' : iso);
      return d>=start && d<=end;
    } catch(e){ return false; }
  });
}

function groupByDate(events) {
  const m={};
  events.forEach(ev=>{ const k=dateKey(ev.start); if(!m[k])m[k]=[]; m[k].push(ev); });
  return Object.entries(m).sort(([a],[b])=>a.localeCompare(b));
}

// ─── TASK REDUCER ─────────────────────────────────────────────────────────────
let _tid = 1000;
const uid = () => String(++_tid);

function taskReducer(tasks, action) {
  let next;
  switch(action.type) {
    case 'TOGGLE': next=tasks.map(t=>t.id===action.id?{...t,done:!t.done}:t); break;
    case 'DELETE': next=tasks.filter(t=>t.id!==action.id); break;
    case 'ADD':    next=[...tasks, action.task]; break;
    case 'EDIT':       next=tasks.map(t=>t.id===action.id?{...t,title:action.title}:t); break;
    case 'EDIT_NOTES': next=tasks.map(t=>t.id===action.id?{...t,notes:action.notes}:t); break;
    default:       next=tasks;
  }
  try { localStorage.setItem('momentum_tasks', JSON.stringify(next)); } catch(e){}
  return next;
}

function loadTasks() {
  try { return JSON.parse(localStorage.getItem('momentum_tasks')||'[]'); }
  catch(e){ return []; }
}

// ─── GOOGLE CALENDAR FETCH ────────────────────────────────────────────────────
async function fetchEvents(token) {
  const now = new Date();
  const end = new Date(now.getTime() + 28*24*3600000); // 4 weeks
  const params = new URLSearchParams({
    timeMin: now.toISOString(),
    timeMax: end.toISOString(),
    singleEvents: 'true',
    orderBy: 'startTime',
    maxResults: '50',
  });

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000); // 8s timeout

  try {
    const res = await fetch(CAL_API+'?'+params, {
      headers: { Authorization: 'Bearer '+token },
      signal: controller.signal,
    });
    clearTimeout(timeout);
    if (res.status===401) throw new Error('TOKEN_EXPIRED');
    if (!res.ok) throw new Error('Calendar API error: '+res.status);
    const data = await res.json();
    return (data.items||[]).map(item => ({
      id:      item.id,
      title:   item.summary || 'Untitled',
      start:   item.start?.dateTime || item.start?.date || '',
      end:     item.end?.dateTime   || item.end?.date   || '',
      allDay:  !item.start?.dateTime,
      location:item.location || '',
      note:    item.location || '',
      cat:     detectCat(item.summary||''),
    }));
  } catch(e) {
    clearTimeout(timeout);
    if (e.name==='AbortError') throw new Error('Request timed out — check your connection and try again.');
    throw e;
  }
}

          }} disabled={step===1}>← Back</button>

          <div style={{fontSize:12,color:'#a8a29e'}}>Step {step} of {STEPS.length}</div>

          {step < 5 ? (
            <button onClick={()=>setStep(s=>s+1)} style={{
              padding:'8px 20px',borderRadius:10,border:'none',
              background:'#1c1917',color:'#fff',fontSize:13,fontWeight:500,cursor:'pointer',
            }}>Next →</button>
          ) : (
            <button
              onClick={()=>{ if(clientId.trim()) onSave(clientId.trim()); }}
              disabled={!clientId.trim()}
              style={{
                padding:'8px 20px',borderRadius:10,border:'none',
                background:clientId.trim()?'#1c1917':'#d6d0c6',
                color:'#fff',fontSize:13,fontWeight:500,
                cursor:clientId.trim()?'pointer':'default',
              }}>Save & Continue</button>
          )}
        </div>

      </div>
    </div>
  );
}

function CalendarView({ events, tasks, onRefresh, refreshing }) {
  const [weekTab, setWeekTab] = useState(0);
  const range    = getWeekRange(weekTab);
  const weekEvs   = filterByWeek(events, weekTab);

  // Get all dates in this week as YYYY-MM-DD strings
  function getWeekDateStrings(offset) {
    const { start } = getWeekRange(offset);
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      dates.push(d.toISOString().slice(0, 10));
    }
    return dates;
  }

  const weekDateStrings = getWeekDateStrings(weekTab);

  // Tasks due this week — simple string comparison, no timezone issues
  const weekTaskDates = weekDateStrings.filter(d =>
    (tasks||[]).some(t => !t.done && t.due === d)
  );

  // Merge event dates + task due dates, sort
  const eventDates = weekEvs.map(e => dateKey(e.start));
  const allDates   = [...new Set([...eventDates, ...weekTaskDates])].sort();
  const grouped    = allDates.map(d => [d, weekEvs.filter(e => dateKey(e.start) === d)]);

  const pendingTasks = (tasks||[]).filter(t => !t.done);
  const noDueTasks   = (tasks||[]).filter(t => !t.done && !t.due);

  const nextFlight = events.find(e => e.cat==='travel' && !e.allDay && new Date(e.start) > new Date());
  const catCounts  = Object.entries(events.reduce((a,e)=>{a[e.cat]=(a[e.cat]||0)+1;return a},{}));

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:26,alignItems:'start'}}>
      {/* Main */}
      <div>
        <div style={{marginBottom:22}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:700,color:'#1c1917'}}>
              {['This Week','Next Week','Week 3','Week 4'][weekTab]}
              <span style={{fontSize:15,fontWeight:400,color:'#a8a29e',marginLeft:10}}>
                {fmtShort(range.start)} – {fmtShort(range.end)}
              </span>
            </h1>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {refreshing && <span style={{fontSize:12,color:'#a8a29e'}}>Getting fresh token…</span>}
              <button onClick={onRefresh} disabled={refreshing} style={{
                display:'flex',alignItems:'center',gap:6,
                padding:'6px 14px',borderRadius:20,border:'1px solid #ede9e3',
                background:refreshing?'#f5f3ee':'#fff',color:'#78716c',fontSize:12,cursor:'pointer',
              }}>
                {refreshing ? <div className="spinner" style={{width:14,height:14,borderWidth:'2px'}}/> : '🔄'}
                {refreshing ? 'Refreshing…' : 'Refresh'}
              </button>
            </div>
          </div>
          <div style={{display:'flex',gap:4,background:'#ede9e3',borderRadius:10,padding:3,width:'fit-content',flexWrap:'wrap'}}>
            {[['This Week',0],['Next Week',1],['Week 3',2],['Week 4',3]].map(([l,v]) => (
              <button key={v} onClick={()=>setWeekTab(v)} style={{
                padding:'6px 14px',borderRadius:8,border:'none',fontSize:13,fontWeight:500,cursor:'pointer',
                background:weekTab===v?'#fff':'transparent',
                color:weekTab===v?'#1c1917':'#78716c',
                boxShadow:weekTab===v?'0 1px 4px rgba(0,0,0,.08)':'none',
                transition:'all .15s',
              }}>{l}</button>
            ))}
          </div>
        </div>

        {grouped.length===0 && pendingTasks.length===0 ? (
          <div style={{textAlign:'center',padding:'60px 0',color:'#a8a29e',fontSize:14}}>
            No events or tasks scheduled for {["this week","next week","week 3","week 4"][weekTab]}.
          </div>
        ) : (
          <>
            {grouped.map(([d,evs]) => <DayGroup key={d} dateStr={d} events={evs} tasks={tasks}/>)}

            {/* Tasks without due dates — always show in calendar */}
            {(() => {
              const noDueTasks = (tasks||[]).filter(t => !t.done && !t.due);
              if (noDueTasks.length === 0) return null;
              return (
                <div style={{marginTop:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <span style={{fontSize:12,fontWeight:600,textTransform:'uppercase',
                      letterSpacing:'.8px',color:'#78716c'}}>Pending Tasks</span>
                    <div style={{flex:1,height:1,background:'#ede9e3'}}/>
                    <span style={{fontSize:11,color:'#a8a29e'}}>{noDueTasks.length} task{noDueTasks.length!==1?'s':''}</span>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:7}}>
                    {noDueTasks.map(t => <TaskPill key={t.id} task={t}/>)}
                  </div>
                </div>
              );
            })()}
          </>
        )}
      </div>

      {/* Sidebar */}
      <div style={{position:'sticky',top:76,display:'flex',flexDirection:'column',gap:14}}>
        {/* Stats */}
        <div style={{background:'#1c1917',borderRadius:16,padding:'20px 18px',color:'#fafaf7'}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,marginBottom:4}}>Calendar</div>
          <div style={{fontSize:12,color:'#a8a29e',marginBottom:14}}>
            {new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'})}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[
              ['This week', filterByWeek(events,0).length],
              ['Next week', filterByWeek(events,1).length],
              ['Flights',   events.filter(e=>e.cat==='travel'&&!e.allDay).length],
              ['Total',     events.length],
            ].map(([l,n]) => (
              <div key={l} style={{background:'rgba(255,255,255,.07)',borderRadius:9,padding:'9px 11px'}}>
                <div style={{fontSize:20,fontWeight:600}}>{n}</div>
                <div style={{fontSize:10,color:'#a8a29e',textTransform:'uppercase',letterSpacing:'.5px'}}>{l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Next flight */}
        {nextFlight && (
          <div style={{background:'#e0f2fe',border:'1px solid #bae6fd',borderRadius:14,padding:'14px 16px'}}>
            <div style={{fontSize:10,fontWeight:600,color:'#0ea5e9',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:6}}>
              ✈️ Next Flight
            </div>
            <div style={{fontSize:14,fontWeight:600,color:'#0c4a6e',marginBottom:2}}>{nextFlight.title}</div>
            <div style={{fontSize:12,color:'#0369a1'}}>{fmtDayFull(dateKey(nextFlight.start))} · {fmtTime(nextFlight.start)}</div>
            {nextFlight.location && <div style={{fontSize:11,color:'#7dd3fc',marginTop:3}}>{nextFlight.location}</div>}
          </div>
        )}

        {/* Categories */}
        {catCounts.length>0 && (
          <div style={{background:'#fff',borderRadius:14,border:'1px solid #ede9e3',padding:'14px 16px'}}>
            <div style={{fontSize:11,fontWeight:600,color:'#78716c',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:12}}>
              Categories
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:9}}>
              {catCounts.map(([cat,count]) => {
                const c=CAT[cat]; if(!c) return null;
                return (
                  <div key={cat}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:13,color:'#1c1917'}}>{c.icon} {c.label}</span>
                      <span style={{fontSize:12,color:'#78716c'}}>{count}</span>
                    </div>
                    <div style={{height:4,background:'#f5f3ee',borderRadius:2}}>
                      <div style={{height:'100%',width:Math.round(count/events.length*100)+'%',background:c.color,borderRadius:2}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// TASK COMPONENTS
// ═════════════════════════════════════════════════════════════════════════════
function TaskRow({ task, dispatch }) {
  const [editing,      setEditing]      = useState(false);
  const [draft,        setDraft]        = useState(task.title);
  const [editingNotes, setEditingNotes] = useState(false);
  const [notesDraft,   setNotesDraft]   = useState(task.notes||'');
  const ref      = useRef(null);
  const notesRef = useRef(null);
  const due      = fmtDue(task.due);

  useEffect(() => { if (editing      && ref.current)      ref.current.focus();      }, [editing]);
  useEffect(() => { if (editingNotes && notesRef.current) notesRef.current.focus(); }, [editingNotes]);

  function save() {
    const t = draft.trim();
    if (t && t!==task.title) dispatch({type:'EDIT',id:task.id,title:t});
    else setDraft(task.title);
    setEditing(false);
  }

  function saveNotes() {
    dispatch({type:'EDIT_NOTES', id:task.id, notes:notesDraft.trim()});
    setEditingNotes(false);
  }

  return (
    <div className="trow" style={{display:'flex',alignItems:'flex-start',gap:11,
      padding:'11px 13px',borderRadius:10,background:'#fff',border:'1px solid #ede9e3'}}>
      <button onClick={()=>dispatch({type:'TOGGLE',id:task.id})} style={{
        width:20,height:20,borderRadius:6,flexShrink:0,marginTop:2,cursor:'pointer',
        border:'2px solid '+(task.done?'#d6d0c6':'#a8a29e'),
        background:task.done?'#f5f3ee':'#fff',
        display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s',
      }}>
        {task.done && <span style={{fontSize:11,color:'#a8a29e',fontWeight:700}}>✓</span>}
      </button>

      <div style={{flex:1,minWidth:0}}>
        {/* Title */}
        {editing ? (
          <input ref={ref} type="text" value={draft}
            onChange={e=>setDraft(e.target.value)}
            onBlur={save}
            onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setDraft(task.title);setEditing(false);}}}
            style={{width:'100%',border:'none',borderBottom:'1px solid #a8a29e',
              background:'transparent',fontSize:14,color:'#1c1917',padding:'2px 0'}}/>
        ) : (
          <div onDoubleClick={()=>{if(!task.done){setDraft(task.title);setEditing(true);}}}
            style={{fontSize:14,lineHeight:1.4,color:task.done?'#a8a29e':'#1c1917',
              textDecoration:task.done?'line-through':'none',cursor:task.done?'default':'text'}}>
            {task.title}
          </div>
        )}

        {/* Notes */}
        {editingNotes ? (
          <textarea ref={notesRef} value={notesDraft}
            onChange={e=>setNotesDraft(e.target.value)}
            onBlur={saveNotes}
            onKeyDown={e=>{if(e.key==='Escape')saveNotes();}}
            placeholder="Add a note…"
            rows={2}
            style={{width:'100%',marginTop:6,border:'1px solid #d6d0c6',borderRadius:6,
              padding:'6px 8px',fontSize:12,color:'#44403c',background:'#fafaf7',
              resize:'vertical',fontFamily:"'Outfit',sans-serif"}}/>
        ) : (
          <div>
            {task.notes
              ? <div onClick={()=>{if(!task.done){setNotesDraft(task.notes);setEditingNotes(true);}}}
                  style={{fontSize:12,color:'#78716c',marginTop:4,lineHeight:1.5,
                    cursor:task.done?'default':'text',padding:'4px 6px',
                    background:'#fafaf7',borderRadius:5,border:'1px solid #f0ece6'}}>
                  📝 {task.notes}
                </div>
              : !task.done && <button onClick={()=>{setNotesDraft('');setEditingNotes(true);}} style={{
                  fontSize:11,color:'#c4b5a0',background:'none',border:'none',
                  cursor:'pointer',marginTop:3,padding:0,
                }}>+ add note</button>
            }
          </div>
        )}

        {due && !task.done && <div style={{fontSize:11,color:due.color,fontWeight:500,marginTop:3}}>{due.label}</div>}
      </div>

      <button className="del" onClick={()=>dispatch({type:'DELETE',id:task.id})} style={{
        opacity:0,width:20,height:20,borderRadius:5,flexShrink:0,cursor:'pointer',
        background:'#fee2e2',color:'#ef4444',border:'none',fontSize:12,
        display:'flex',alignItems:'center',justifyContent:'center',transition:'opacity .15s',
      }}>✕</button>
    </div>
  );
}

function AddForm({ listId, list, dispatch, onClose }) {
  const [title, setTitle] = useState('');
  const [notes, setNotes] = useState('');
  const [due,   setDue]   = useState('');
  const ref = useRef(null);
  useEffect(() => { if(ref.current) ref.current.focus(); }, []);

  function submit() {
    const t = title.trim(); if(!t) return;
    dispatch({type:'ADD',task:{id:uid(),list:listId,title:t,notes:notes.trim(),done:false,due:due||null}});
    setTitle(''); setNotes(''); setDue(''); onClose();
  }

  return (
    <div style={{background:list.bg,border:'1px solid '+list.color+'40',borderRadius:12,padding:'14px 16px',marginBottom:14}}>
      <input ref={ref} type="text" value={title} onChange={e=>setTitle(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter')submit();if(e.key==='Escape')onClose();}}
        placeholder="Task title…"
        style={{width:'100%',border:'none',borderBottom:'1px solid '+list.color+'60',
          background:'transparent',fontSize:15,color:'#1c1917',padding:'4px 0',marginBottom:10}}/>
      <textarea value={notes} onChange={e=>setNotes(e.target.value)}
        placeholder="Notes (optional)…" rows={2}
        style={{width:'100%',border:'1px solid '+list.color+'40',borderRadius:7,
          background:'rgba(255,255,255,0.7)',fontSize:12,color:'#44403c',
          padding:'7px 10px',marginBottom:10,resize:'vertical',
          fontFamily:"'Outfit',sans-serif"}}/>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <input type="date" value={due} onChange={e=>setDue(e.target.value)}
          style={{border:'1px solid #ede9e3',borderRadius:6,padding:'4px 8px',
            fontSize:12,color:'#1c1917',background:'#fff'}}/>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          <button onClick={onClose} style={{padding:'5px 12px',borderRadius:8,border:'1px solid #ede9e3',
            background:'#fff',color:'#78716c',fontSize:12,cursor:'pointer'}}>Cancel</button>
          <button onClick={submit} style={{padding:'5px 14px',borderRadius:8,border:'none',
            background:list.color,color:'#fff',fontSize:12,fontWeight:500,cursor:'pointer'}}>Add</button>
        </div>
      </div>
    </div>
  );
}

function TaskPane({ listId, tasks, dispatch }) {
  const [hideDone, setHideDone] = useState(false);
  const [adding,   setAdding]   = useState(false);
  const list  = LISTS.find(l=>l.id===listId);
  const all   = tasks.filter(t=>t.list===listId);
  const shown = hideDone ? all.filter(t=>!t.done) : all;
  const done  = all.filter(t=>t.done).length;
  const pend  = all.filter(t=>!t.done).length;
  const pct   = all.length ? Math.round(done/all.length*100) : 0;

  return (
    <div className="fade">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:42,height:42,borderRadius:12,background:list.bg,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{list.icon}</div>
          <div>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:'#1c1917',lineHeight:1}}>
              {list.label}
            </h2>
            <div style={{fontSize:12,color:'#78716c',marginTop:3}}>{pend} pending · {done} completed</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {done>0 && (
            <button onClick={()=>setHideDone(h=>!h)} style={{
              padding:'6px 14px',borderRadius:20,fontSize:12,cursor:'pointer',transition:'all .15s',
              border:'1px solid #ede9e3',background:hideDone?list.color:'#fff',color:hideDone?'#fff':'#78716c',
            }}>
              {hideDone ? 'Show '+done+' done' : 'Hide '+done+' done'}
            </button>
          )}
          <button onClick={()=>setAdding(a=>!a)} style={{
            padding:'6px 16px',borderRadius:20,fontSize:12,fontWeight:500,
            border:'none',background:list.color,color:'#fff',cursor:'pointer',
          }}>+ Add task</button>
        </div>
      </div>

      {adding && <AddForm listId={listId} list={list} dispatch={dispatch} onClose={()=>setAdding(false)}/>}

      {shown.length===0 ? (
        <div style={{textAlign:'center',padding:'48px 0',color:'#a8a29e',fontSize:14}}>
          {hideDone ? "All tasks hidden — click 'Show done' to see them" : "No tasks yet. Click '+ Add task' to start."}
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:7}}>
          {shown.map(t => <TaskRow key={t.id} task={t} dispatch={dispatch}/>)}
        </div>
      )}

      {all.length>0 && (
        <div style={{marginTop:22}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#a8a29e',marginBottom:5}}>
            <span>Progress</span><span>{done}/{all.length} complete</span>
          </div>
          <div style={{height:5,background:'#ede9e3',borderRadius:3}}>
            <div style={{height:'100%',borderRadius:3,background:list.color,width:pct+'%',transition:'width .4s ease'}}/>
          </div>
        </div>
      )}
    </div>
  );
}

function TaskSidebar({ tasks, activeList, setActiveList }) {
  const pending = tasks.filter(t=>!t.done).length;
  const overdue = tasks.filter(t=>{
    if(t.done||!t.due) return false;
    return new Date(t.due+'T23:59:59') < new Date();
  }).length;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{background:'#1c1917',borderRadius:16,padding:'20px 18px',color:'#fafaf7'}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,marginBottom:14}}>My Tasks</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[['Pending',pending,false],['Overdue',overdue,overdue>0],
            ['Lists',LISTS.length,false],['Done',tasks.filter(t=>t.done).length,false]].map(([l,n,warn])=>(
            <div key={l} style={{background:'rgba(255,255,255,.07)',borderRadius:9,padding:'9px 11px'}}>
              <div style={{fontSize:20,fontWeight:600,color:warn?'#fca5a5':'#fafaf7'}}>{n}</div>
              <div style={{fontSize:10,color:'#a8a29e',textTransform:'uppercase',letterSpacing:'.5px'}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:14,border:'1px solid #ede9e3',padding:'14px 16px'}}>
        <div style={{fontSize:11,fontWeight:600,color:'#78716c',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:10}}>
          Task Lists
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {LISTS.map(list => {
            const cnt=tasks.filter(t=>t.list===list.id&&!t.done).length;
            const active=activeList===list.id;
            return (
              <button key={list.id} onClick={()=>setActiveList(list.id)} style={{
                display:'flex',alignItems:'center',gap:10,padding:'9px 11px',
                borderRadius:10,textAlign:'left',cursor:'pointer',transition:'all .15s',
                background:active?list.bg:'transparent',
                border:active?'1px solid '+list.color+'40':'1px solid transparent',
              }}>
                <div style={{width:30,height:30,borderRadius:8,fontSize:15,flexShrink:0,
                  background:active?list.color:list.bg,transition:'background .15s',
                  display:'flex',alignItems:'center',justifyContent:'center'}}>{list.icon}</div>
                <span style={{flex:1,fontSize:13,fontWeight:500,color:active?list.dark:'#44403c'}}>{list.label}</span>
                {cnt>0 && <span style={{fontSize:11,fontWeight:600,color:list.color,
                  background:list.bg,borderRadius:10,padding:'1px 7px'}}>{cnt}</span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}



function App() {
  const savedId = loadClientIdStorage;

  const [screen,     setScreen]     = useState(savedId() ? 'auth' : 'setup');
  const [clientId,   setClientId]   = useState(savedId);
  const [events,     setEvents]     = useState([]);
  const [loading,    setLoading]    = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [error,      setError]      = useState('');
  const [tab,        setTab]        = useState('calendar');
  const [activeList, setActiveList] = useState('personal');
  const [tasks,      dispatch]      = useReducer(taskReducer, null, loadTasks);

  const tokenClientRef = useRef(null);
  const accessTokenRef = useRef(null);

  // Init Google token client and auto-trigger sign-in immediately
  useEffect(() => {
    if (screen !== 'auth' && screen !== 'app') return;
    const tryInit = () => {
      if (!window.google?.accounts?.oauth2) return false;
      tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: SCOPE,
        callback: handleTokenResponse,
      });
      // Auto-trigger sign-in immediately — no button tap needed
      if (screen === 'auth') {
        setLoading(true);
        tokenClientRef.current.requestAccessToken({ prompt: '' });
      }
      return true;
    };
    if (!tryInit()) {
      const iv = setInterval(() => { if (tryInit()) clearInterval(iv); }, 200);
      return () => clearInterval(iv);
    }
  }, [screen, clientId]);

  async function handleTokenResponse(response) {
    if (response.error) {
      setError('Sign-in error: '+response.error);
      setLoading(false);
      setRefreshing(false);
      return;
    }
    accessTokenRef.current = response.access_token;
    try {
      const evs = await fetchEvents(response.access_token);
      setEvents(evs);
      setScreen('app');
      setError('');
    } catch(e) {
      setError(e.message==='TOKEN_EXPIRED' ? 'Session expired — please reload.' : e.message);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  }

  function signIn() {
    setLoading(true); setError('');
    if (tokenClientRef.current) tokenClientRef.current.requestAccessToken({ prompt: '' });
    else { setError('Google auth not ready yet. Please wait a moment and try again.'); setLoading(false); }
  }

  async function refresh() {
    setRefreshing(true); setError('');
    // Always request a fresh token — never reuse stored one
    if (tokenClientRef.current) {
      tokenClientRef.current.requestAccessToken({ prompt: '' });
      // handleTokenResponse will set refreshing to false when done
    } else {
      setError('Auth not ready. Please reload the page.');
      setRefreshing(false);
    }
  }

  function saveClientId(id) {
    saveClientIdStorage(id);
    setClientId(id);
    setScreen('auth');
  }

  function resetClientId() {
    try { localStorage.removeItem('momentum_client_id'); } catch(e) {}
    try { sessionStorage.removeItem('momentum_client_id'); } catch(e) {}
    try { document.cookie = 'momentum_cid=;max-age=0;path=/'; } catch(e) {}
    accessTokenRef.current = null;
    setClientId('');
    setScreen('setup');
  }

  // ── Screens ──
  if (screen==='setup') return <SetupScreen onSave={saveClientId}/>;
  if (screen==='auth')  return <AuthScreen onSignIn={signIn} onReset={resetClientId} loading={loading} error={error}/>;

  // ── Main App ──
  return (
    <div style={{minHeight:'100vh',background:'#f5f3ee'}}>
      {/* Header */}
      <div style={{background:'#fff',borderBottom:'1px solid #ede9e3',
        padding:'0 32px',height:58,
        display:'flex',alignItems:'center',justifyContent:'space-between',
        position:'sticky',top:0,zIndex:10}}>

        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:32,height:32,borderRadius:9,
            background:'linear-gradient(135deg,#1c1917,#44403c)',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:15,color:'#fafaf7'}}>◈</div>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:'#1c1917'}}>
            Momentum
          </span>
          <div style={{display:'flex',gap:2,marginLeft:14,background:'#f5f3ee',borderRadius:9,padding:3}}>
            {[['calendar','📅  Calendar'],['tasks','✓  Tasks']].map(([k,l]) => (
              <button key={k} onClick={()=>setTab(k)} style={{
                padding:'5px 16px',borderRadius:7,fontSize:13,fontWeight:500,border:'none',cursor:'pointer',
                background:tab===k?'#fff':'transparent',
                color:tab===k?'#1c1917':'#78716c',
                boxShadow:tab===k?'0 1px 4px rgba(0,0,0,.08)':'none',
                transition:'all .15s',
              }}>{l}</button>
            ))}
          </div>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>generatePrint(events, tasks)} style={{
            display:'flex',alignItems:'center',gap:6,
            padding:'6px 14px',borderRadius:20,border:'1px solid #ede9e3',
            background:'#fff',color:'#78716c',fontSize:12,fontWeight:500,cursor:'pointer',
          }}>🖨️ Export</button>
          <button onClick={resetClientId} style={{
            fontSize:11,color:'#a8a29e',background:'none',border:'none',cursor:'pointer',
            textDecoration:'underline',
          }}>Sign out</button>
        </div>
      </div>

      {/* Body */}
      <div style={{maxWidth:1160,margin:'0 auto',padding:'30px 32px'}}>
        {tab==='calendar' ? (
          <CalendarView events={events} tasks={tasks} onRefresh={refresh} refreshing={refreshing}/>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:26,alignItems:'start'}}>
            <TaskPane listId={activeList} tasks={tasks} dispatch={dispatch}/>
            <div style={{position:'sticky',top:76}}>
              <TaskSidebar tasks={tasks} activeList={activeList} setActiveList={setActiveList}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
