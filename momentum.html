// ── Helpers ───────────────────────────────────────────────────────────────────
function detectCat(t) {
t = (t||’’).toLowerCase();
if (/flight|trip|travel|holiday/.test(t)) return ‘travel’;
if (/\bdr\b|\bgp\b|clinic|hospital|physio|\bpt\b|dentist|medical/.test(t)) return ‘health’;
if (/work|meeting|zoom|teams|conference|seminar|forum/.test(t)) return ‘work’;
if (/dinner|lunch|breakfast|party|birthday|drinks|coffee/.test(t)) return ‘social’;
return ‘personal’;
}

function dkey(iso) {
iso = iso || ‘’;
return iso.length === 10 ? iso : iso.slice(0, 10);
}

function ftime(iso) {
if (!iso || iso.length === 10) return ‘’;
try { return new Date(iso).toLocaleTimeString(‘en-AU’, {hour:‘numeric’, minute:‘2-digit’, hour12:true}); }
catch(e) { return ‘’; }
}

function fdayfull(iso) {
try { return new Date(iso + ‘T12:00:00’).toLocaleDateString(‘en-AU’, {weekday:‘long’, day:‘numeric’, month:‘long’}); }
catch(e) { return iso; }
}

function fshort(d) {
try { return d.toLocaleDateString(‘en-AU’, {day:‘numeric’, month:‘short’}); }
catch(e) { return ‘’; }
}

function istoday(iso) {
return iso === new Date().toISOString().slice(0, 10);
}

function fdue(iso) {
if (!iso) return null;
try {
var d = new Date(iso + ‘T12:00:00’);
var t = new Date(); t.setHours(0,0,0,0);
var diff = Math.floor((d - t) / 86400000);
if (diff < 0)  return {label:‘Overdue’,      color:’#ef4444’};
if (diff === 0) return {label:‘Due today’,   color:’#f59e0b’};
if (diff === 1) return {label:‘Due tomorrow’,color:’#f59e0b’};
return {label:‘Due ’ + d.toLocaleDateString(‘en-AU’,{day:‘numeric’,month:‘short’}), color:’#78716c’};
} catch(e) { return null; }
}

function weekRange(offset) {
var today = new Date();
var dow = today.getDay();
var toMon = dow === 0 ? -6 : 1 - dow;
var mon = new Date(today);
mon.setDate(today.getDate() + toMon + offset * 7);
mon.setHours(0,0,0,0);
var sun = new Date(mon);
sun.setDate(mon.getDate() + 6);
sun.setHours(23,59,59,999);
return {start:mon, end:sun};
}

function weekDates(offset) {
var r = weekRange(offset);
var dates = [];
for (var i = 0; i < 7; i++) {
var d = new Date(r.start);
d.setDate(r.start.getDate() + i);
dates.push(d.toISOString().slice(0, 10));
}
return dates;
}

function filterWeek(evs, offset) {
var r = weekRange(offset);
return evs.filter(function(ev) {
try {
var iso = ev.start;
var d = new Date(iso.length === 10 ? iso + ‘T00:00:00’ : iso);
return d >= r.start && d <= r.end;
} catch(e) { return false; }
});
}

// ── Storage ───────────────────────────────────────────────────────────────────
function saveId(id) {
try { localStorage.setItem(‘momentum_cid’, id); } catch(e) {}
try { sessionStorage.setItem(‘momentum_cid’, id); } catch(e) {}
try { document.cookie = ‘mcid=’ + encodeURIComponent(id) + ‘;max-age=31536000;path=/;SameSite=Lax’; } catch(e) {}
}
function loadId() {
try { var v = localStorage.getItem(‘momentum_cid’); if (v) return v; } catch(e) {}
try { var v = sessionStorage.getItem(‘momentum_cid’); if (v) return v; } catch(e) {}
try { var m = document.cookie.match(/mcid=([^;]+)/); if (m) return decodeURIComponent(m[1]); } catch(e) {}
return ‘’;
}
function clearId() {
try { localStorage.removeItem(‘momentum_cid’); } catch(e) {}
try { sessionStorage.removeItem(‘momentum_cid’); } catch(e) {}
try { document.cookie = ‘mcid=;max-age=0;path=/’; } catch(e) {}
}
function saveTasks(tasks) {
try { localStorage.setItem(‘momentum_tasks’, JSON.stringify(tasks)); } catch(e) {}
}
function loadTasks() {
try { return JSON.parse(localStorage.getItem(‘momentum_tasks’) || ‘[]’); } catch(e) { return []; }
}

// ── Task Reducer ──────────────────────────────────────────────────────────────
var _tid = 1000;
function uid() { return String(++_tid); }

function taskReducer(tasks, action) {
var next;
if (action.type === ‘TOGGLE’) {
next = tasks.map(function(t) { return t.id === action.id ? Object.assign({}, t, {done: !t.done}) : t; });
} else if (action.type === ‘DELETE’) {
next = tasks.filter(function(t) { return t.id !== action.id; });
} else if (action.type === ‘ADD’) {
next = tasks.concat([action.task]);
} else if (action.type === ‘EDIT’) {
next = tasks.map(function(t) { return t.id === action.id ? Object.assign({}, t, {title: action.title}) : t; });
} else if (action.type === ‘EDIT_NOTES’) {
next = tasks.map(function(t) { return t.id === action.id ? Object.assign({}, t, {notes: action.notes}) : t; });
} else {
next = tasks;
}
saveTasks(next);
return next;
}

// ── Calendar API ──────────────────────────────────────────────────────────────
async function fetchCal(token) {
var now = new Date();
var end = new Date(now.getTime() + 28 * 24 * 3600000);
var p = new URLSearchParams({
timeMin: now.toISOString(),
timeMax: end.toISOString(),
singleEvents: ‘true’,
orderBy: ‘startTime’,
maxResults: ‘100’,
});
var ctrl = new AbortController();
var timer = setTimeout(function() { ctrl.abort(); }, 10000);
try {
var res = await fetch(CAL_API + ‘?’ + p, {
headers: { Authorization: ’Bearer ’ + token },
signal: ctrl.signal,
});
clearTimeout(timer);
if (res.status === 401) throw new Error(‘TOKEN_EXPIRED’);
if (!res.ok) throw new Error(’Calendar error ’ + res.status);
var data = await res.json();
return (data.items || []).map(function(item) {
return {
id:       item.id,
title:    item.summary || ‘Untitled’,
start:    (item.start && (item.start.dateTime || item.start.date)) || ‘’,
end:      (item.end   && (item.end.dateTime   || item.end.date))   || ‘’,
allDay:   !(item.start && item.start.dateTime),
location: item.location || ‘’,
cat:      detectCat(item.summary || ‘’),
};
});
} catch(e) {
clearTimeout(timer);
if (e.name === ‘AbortError’) throw new Error(‘Request timed out.’);
throw e;
}
}

function CalendarView(props) {
var events     = props.events;
var tasks      = props.tasks;
var onRefresh  = props.onRefresh;
var refreshing = props.refreshing;
var wtab = useState(0); var setWtab = wtab[1]; wtab = wtab[0];

var r        = weekRange(wtab);
var wdates   = weekDates(wtab);
var wevs     = filterWeek(events, wtab);
var evDates  = wevs.map(function(e) { return dkey(e.start); });
var tkDates  = wdates.filter(function(d) {
return (tasks || []).some(function(t) { return !t.done && t.due === d; });
});
var allDates = [];
var seen = {};
evDates.concat(tkDates).forEach(function(d) { if (!seen[d]) { seen[d] = true; allDates.push(d); } });
allDates.sort();

function TaskRow(props) {

useEffect(function() { if (editing   && titleRef.current) titleRef.current.focus(); }, [editing]);

var refreshing_= useState(false);                         var setRefreshing= refreshing_[1];var refreshing= refreshing_[0];
var error_     = useState(’’);                            var setError     = error_[1];     var error     = error_[0];
var tab_       = useState(‘calendar’);                    var setTab       = tab_[1];       var tab       = tab_[0];
var activeList_= useState(‘personal’);                    var setActiveList= activeList_[1];var activeList= activeList_[0];
var showExport_= useState(false);                         var setShowExport= showExport_[1];var showExport= showExport_[0];
var tasks      = useReducer(taskReducer, null, loadTasks);var dispatch = tasks[1]; tasks = tasks[0];
var tcRef      = useRef(null);

useEffect(function() {
if (screen !== ‘auth’ && screen !== ‘app’) return;
function tryInit() {
if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) return false;
tcRef.current = window.google.accounts.oauth2.initTokenClient({
client_id: clientId,
scope: SCOPE,
callback: handleToken,
});
if (screen === ‘auth’) {
setLoading(true);
tcRef.current.requestAccessToken({prompt: ‘’});
}
return true;
}
if (!tryInit()) {
var iv = setInterval(function() { if (tryInit()) clearInterval(iv); }, 300);
return function() { clearInterval(iv); };
}
}, [screen, clientId]);

async function handleToken(resp) {
if (resp.error) {
setError(‘Sign-in error: ’ + resp.error);
setLoading(false);
setRefreshing(false);
return;
}
try {
var evs = await fetchCal(resp.access_token);
setEvents(evs);
setScreen(‘app’);
setError(’’);
} catch(e) {
setError(e.message === ‘TOKEN_EXPIRED’ ? ‘Session expired. Reload page.’ : e.message);
}
setLoading(false);
setRefreshing(false);
}

function refresh() {
setRefreshing(true);
setError(’’);
if (tcRef.current) {
tcRef.current.requestAccessToken({prompt: ‘’});
} else {
setError(‘Auth not ready. Please reload.’);
setRefreshing(false);
}
}

function doSaveClientId(id) { saveId(id); setClientId(id); setScreen(‘auth’); }
function doReset()          { clearId(); setClientId(’’); setScreen(‘setup’); }

if (screen === ‘setup’) return <SetupScreen onSave={doSaveClientId} />;
if (screen === ‘auth’)  return <AuthScreen  onReset={doReset} err={error} />;

return (
<div style={{minHeight:‘100vh’,background:’#f5f3ee’}}>
{showExport ? <ExportOverlay events={events} tasks={tasks} onClose={function(){setShowExport(false);}} /> : null}
<div style={{background:’#fff’,borderBottom:‘1px solid #ede9e3’,padding:‘0 24px’,height:‘54px’,display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’,position:‘sticky’,top:‘0’,zIndex:‘10’}}>
<div style={{display:‘flex’,alignItems:‘center’,gap:‘11px’}}>
<div style={{width:‘29px’,height:‘29px’,borderRadius:‘8px’,background:‘linear-gradient(135deg,#1c1917,#44403c)’,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,fontSize:‘14px’,color:’#fafaf7’}}>◈</div>
<span style={{fontFamily:”‘Cormorant Garamond’,serif”,fontSize:‘18px’,fontWeight:‘700’,color:’#1c1917’}}>Momentum</span>
<div style={{display:‘flex’,gap:‘2px’,marginLeft:‘10px’,background:’#f5f3ee’,borderRadius:‘8px’,padding:‘3px’}}>
{[[‘calendar’,‘📅 Calendar’],[‘tasks’,‘✓ Tasks’]].map(function(pair) {
var active = tab === pair[0];
return (
<button key={pair[0]} onClick={function(){setTab(pair[0]);}}
style={{padding:‘4px 12px’,borderRadius:‘6px’,fontSize:‘12px’,fontWeight:‘500’,border:‘none’,cursor:‘pointer’,background:active?’#fff’:‘transparent’,color:active?’#1c1917’:’#78716c’,boxShadow:active?‘0 1px 4px rgba(0,0,0,.07)’:‘none’}}>
{pair[1]}
</button>
);
})}
</div>
</div>
<div style={{display:‘flex’,alignItems:‘center’,gap:‘9px’}}>
<button onClick={function(){setShowExport(true);}}
style={{padding:‘4px 12px’,borderRadius:‘16px’,border:‘1px solid #ede9e3’,background:’#fff’,color:’#78716c’,fontSize:‘12px’,cursor:‘pointer’}}>
Export
</button>
<button onClick={doReset}
style={{fontSize:‘11px’,color:’#a8a29e’,background:‘none’,border:‘none’,cursor:‘pointer’,textDecoration:‘underline’}}>
Sign out
</button>
</div>
</div>
<div style={{maxWidth:‘1100px’,margin:‘0 auto’,padding:‘24px’}}>
{tab === ‘calendar’
? <CalendarView events={events} tasks={tasks} onRefresh={refresh} refreshing={refreshing} />
: <div style={{display:‘grid’,gridTemplateColumns:‘1fr 260px’,gap:‘22px’,alignItems:‘start’}}>
<TaskPane listId={activeList} tasks={tasks} dispatch={dispatch} />
<div style={{position:‘sticky’,top:‘70px’}}>
<TaskSidebar tasks={tasks} activeList={activeList} setActive={setActiveList} />
</div>
</div>
}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(React.createElement(App, null));
</script>

</body>
</html>
