  { id:'personal',   label:'Personal',         icon:'👤', color:'#f59e0b', bg:'#fef3c7', dark:'#92400e' },
  { id:'kids',       label:'Kids',             icon:'🧒', color:'#10b981', bg:'#d1fae5', dark:'#065f46' },
  { id:'christmas',  label:'Christmas Wonder', icon:'🎄', color:'#ef4444', bg:'#fee2e2', dark:'#991b1b' },
  { id:'property',   label:'Property',         icon:'🏡', color:'#0ea5e9', bg:'#e0f2fe', dark:'#0c4a6e' },

  { id:'work',       label:'Work',             icon:'💼', color:'#64748b', bg:'#f1f5f9', dark:'#1e293b' },

const CAT = {
  travel:   { color:'#0ea5e9', bg:'#e0f2fe', icon:'✈️',  label:'Travel'   },
  work:     { color:'#8b5cf6', bg:'#ede9fe', icon:'💼',  label:'Work'     },
  health:   { color:'#10b981', bg:'#d1fae5', icon:'🏥',  label:'Health'   },
  social:   { color:'#f59e0b', bg:'#fef3c7', icon:'🍽️', label:'Social'   },
  personal: { color:'#ec4899', bg:'#fce7f3', icon:'🏠',  label:'Personal' },
};

function detectCat(title) {
  const t = (title||'').toLowerCase();
  if (/flight|trip|travel|holiday|vacation/.test(t)) return 'travel';
  if (/\bdr\b|doctor|\bgp\b|clinic|hospital|physio|\bpt\b|dentist|medical|health/.test(t)) return 'health';
  if (/work|meeting|\bcall\b|zoom|teams|review|conference|seminar|forum|workshop/.test(t)) return 'work';
  if (/dinner|lunch|breakfast|party|birthday|drinks|\bbbq\b|coffee|brunch/.test(t)) return 'social';
  return 'personal';
}

function dateKey(iso) { return (iso||'').length===10 ? iso : (iso||'').slice(0,10); }

function fmtTime(iso) {
  if (!iso||iso.length===10) return '';
  try { return new Date(iso).toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit',hour12:true}); }
  catch(e){ return ''; }
}

function fmtDayFull(iso) {
  try { return new Date(iso+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'}); }
  catch(e){ return iso; }
}

function fmtShort(d) {
  try { return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
  catch(e){ return ''; }
}

function isToday(iso) { return iso===new Date().toISOString().slice(0,10); }

function fmtDue(iso) {
  if (!iso) return null;
  try {
    const d=new Date(iso+'T12:00:00'), t=new Date(); t.setHours(0,0,0,0);
    const diff=Math.floor((d-t)/86400000);
    if (diff<0)   return {label:'Overdue',      color:'#ef4444'};
    if (diff===0) return {label:'Due today',    color:'#f59e0b'};
    if (diff===1) return {label:'Due tomorrow', color:'#f59e0b'};
    return {label:'Due '+d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}), color:'#78716c'};
  } catch(e){ return null; }
}

function getWeekRange(offset) {
  const today=new Date(), dow=today.getDay();
  const toMon=dow===0?-6:1-dow;
  const mon=new Date(today); mon.setDate(today.getDate()+toMon+offset*7); mon.setHours(0,0,0,0);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return {start:mon,end:sun};
}

function getWeekDates(offset) {
  const {start}=getWeekRange(offset);
  const dates=[];
  for (let i=0;i<7;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

function filterByWeek(events,offset) {
  const {start,end}=getWeekRange(offset);
  return events.filter(ev=>{
    try {
      const iso=ev.start, d=new Date(iso.length===10?iso+'T00:00:00':iso);
      return d>=start&&d<=end;
    } catch(e){ return false; }
  });
}

function saveId(id) {
  try { localStorage.setItem('momentum_client_id',id); } catch(e){}
  try { sessionStorage.setItem('momentum_client_id',id); } catch(e){}
  try { document.cookie='momentum_cid='+encodeURIComponent(id)+';max-age=31536000;path=/;SameSite=Lax'; } catch(e){}
}
function loadId() {
  try { const v=localStorage.getItem('momentum_client_id'); if(v) return v; } catch(e){}
  try { const v=sessionStorage.getItem('momentum_client_id'); if(v) return v; } catch(e){}
  try { const m=document.cookie.match(/momentum_cid=([^;]+)/); if(m) return decodeURIComponent(m[1]); } catch(e){}
  return '';
}
function clearId() {
  try { localStorage.removeItem('momentum_client_id'); } catch(e){}
  try { sessionStorage.removeItem('momentum_client_id'); } catch(e){}
  try { document.cookie='momentum_cid=;max-age=0;path=/'; } catch(e){}
}

let _tid=1000;
const uid=()=>String(++_tid);

function taskReducer(tasks,action) {
  let next;
  switch(action.type) {
    case 'TOGGLE':     next=tasks.map(t=>t.id===action.id?{...t,done:!t.done}:t); break;
    case 'DELETE':     next=tasks.filter(t=>t.id!==action.id); break;
    case 'ADD':        next=[...tasks,action.task]; break;
    case 'EDIT':       next=tasks.map(t=>t.id===action.id?{...t,title:action.title}:t); break;
    case 'EDIT_NOTES': next=tasks.map(t=>t.id===action.id?{...t,notes:action.notes}:t); break;
    default:           next=tasks;
  }
  try { localStorage.setItem('momentum_tasks',JSON.stringify(next)); } catch(e){}
  return next;
}
function loadTasks() {
  try { return JSON.parse(localStorage.getItem('momentum_tasks')||'[]'); }
  catch(e){ return []; }
}

async function fetchEvents(token) {
  const now=new Date(), end=new Date(now.getTime()+28*24*3600000);
  const params=new URLSearchParams({
    timeMin:now.toISOString(), timeMax:end.toISOString(),
    singleEvents:'true', orderBy:'startTime', maxResults:'100',
  });
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),10000);
  try {
    const res=await fetch(CAL_API+'?'+params,{headers:{Authorization:'Bearer '+token},signal:ctrl.signal});
    clearTimeout(timer);
    if (res.status===401) throw new Error('TOKEN_EXPIRED');
    if (!res.ok) throw new Error('Calendar error: '+res.status);
    const data=await res.json();
    return (data.items||[]).map(item=>({
      id:item.id, title:item.summary||'Untitled',
      start:item.start?.dateTime||item.start?.date||'',
      end:item.end?.dateTime||item.end?.date||'',
      allDay:!item.start?.dateTime,
      location:item.location||'', cat:detectCat(item.summary||''),
    }));
  } catch(e){
    clearTimeout(timer);
    if (e.name==='AbortError') throw new Error('Request timed out.');
    throw e;
  }
}

function CalendarView({events,tasks,onRefresh,refreshing}) {

  const weekEvs=filterByWeek(events,weekTab);
  const weekDates=getWeekDates(weekTab);
  const taskDates=weekDates.filter(d=>(tasks||[]).some(t=>!t.done&&t.due===d));
  const allDates=[...new Set([...weekEvs.map(e=>dateKey(e.start)),...taskDates])].sort();
  const grouped=allDates.map(d=>[d,weekEvs.filter(e=>dateKey(e.start)===d)]);
  const noDue=(tasks||[]).filter(t=>!t.done&&!t.due);
  const nextFlight=events.find(e=>e.cat==='travel'&&!e.allDay&&new Date(e.start)>new Date());
  const catCounts=Object.entries(events.reduce((a,e)=>{a[e.cat]=(a[e.cat]||0)+1;return a},{}));
  const weekLabels=['This Week','Next Week','Week 3','Week 4'];

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 270px',gap:24,alignItems:'start'}}>
      <div>
        <div style={{marginBottom:18}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:'#1c1917'}}>
              {weekLabels[weekTab]}
              <span style={{fontSize:13,fontWeight:400,color:'#a8a29e',marginLeft:9}}>{fmtShort(range.start)+' – '+fmtShort(range.end)}</span>
            </h1>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              {refreshing&&<span style={{fontSize:11,color:'#a8a29e'}}>Loading...</span>}

                {refreshing?<div className="spinner" style={{width:13,height:13,borderWidth:'2px'}}/>:'🔄'}
                {refreshing?'Refreshing...':'Refresh'}
              </button>
            </div>
          </div>
          <div style={{display:'flex',gap:3,background:'#ede9e3',borderRadius:9,padding:3,width:'fit-content'}}>
            {weekLabels.map((l,v)=>(
              <button key={v} onClick={()=>setWeekTab(v)} style={{padding:'5px 12px',borderRadius:7,border:'none',fontSize:12,fontWeight:500,cursor:'pointer',transition:'all .15s',background:weekTab===v?'#fff':'transparent',color:weekTab===v?'#1c1917':'#78716c',boxShadow:weekTab===v?'0 1px 4px rgba(0,0,0,.08)':'none'}}>{l}</button>

                <div style={{marginTop:6}}>
                  <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.8px',color:'#78716c'}}>Pending Tasks</span>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
            {[['This week',filterByWeek(events,0).length],['Next week',filterByWeek(events,1).length],['Flights',events.filter(e=>e.cat==='travel'&&!e.allDay).length],['Total',events.length]].map(([l,n])=>(

                    </div>
                    <div style={{height:3,background:'#f5f3ee',borderRadius:2}}>
                      <div style={{height:'100%',width:Math.round(count/events.length*100)+'%',background:c.color,borderRadius:2}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function TaskRow({task,dispatch}) {
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(task.title);
  const [editNotes,setEditNotes]=useState(false);
  const [notesDraft,setNotesDraft]=useState(task.notes||'');
  const titleRef=useRef(null);
  const notesRef=useRef(null);
  const due=fmtDue(task.due);

  useEffect(()=>{if(editing&&titleRef.current)titleRef.current.focus();},[editing]);
  useEffect(()=>{if(editNotes&&notesRef.current)notesRef.current.focus();},[editNotes]);

  function saveTitle(){
    const t=draft.trim();
    if(t&&t!==task.title) dispatch({type:'EDIT',id:task.id,title:t});
    else setDraft(task.title);
    setEditing(false);
  }
  function saveNotes(){
    dispatch({type:'EDIT_NOTES',id:task.id,notes:notesDraft.trim()});
    setEditNotes(false);
  }

  return (
    <div className="trow" style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',borderRadius:9,background:'#fff',border:'1px solid #ede9e3'}}>
      <button onClick={()=>dispatch({type:'TOGGLE',id:task.id})} style={{width:19,height:19,borderRadius:5,flexShrink:0,marginTop:2,cursor:'pointer',border:'2px solid '+(task.done?'#d6d0c6':'#a8a29e'),background:task.done?'#f5f3ee':'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>
        {task.done&&<span style={{fontSize:10,color:'#a8a29e',fontWeight:700}}>✓</span>}
      </button>
      <div style={{flex:1,minWidth:0}}>
        {editing
          ? <input ref={titleRef} type="text" value={draft} onChange={e=>setDraft(e.target.value)} onBlur={saveTitle}
              onKeyDown={e=>{if(e.key==='Enter')saveTitle();if(e.key==='Escape'){setDraft(task.title);setEditing(false);}}}
              style={{width:'100%',border:'none',borderBottom:'1px solid #a8a29e',background:'transparent',fontSize:13,color:'#1c1917',padding:'2px 0'}}/>
          : <div onDoubleClick={()=>{if(!task.done){setDraft(task.title);setEditing(true);}}}
              style={{fontSize:13,lineHeight:1.4,color:task.done?'#a8a29e':'#1c1917',textDecoration:task.done?'line-through':'none',cursor:task.done?'default':'text'}}>
              {task.title}
            </div>
        }
        {editNotes
          ? <textarea ref={notesRef} value={notesDraft} onChange={e=>setNotesDraft(e.target.value)} onBlur={saveNotes}
              onKeyDown={e=>{if(e.key==='Escape')saveNotes();}}
              placeholder="Add a note..." rows={2}
              style={{width:'100%',marginTop:5,border:'1px solid #d6d0c6',borderRadius:6,padding:'5px 8px',fontSize:12,color:'#44403c',background:'#fafaf7',resize:'vertical'}}/>
          : <div>
              {task.notes
                ? <div onClick={()=>{if(!task.done){setNotesDraft(task.notes);setEditNotes(true);}}}
                    style={{fontSize:12,color:'#78716c',marginTop:3,lineHeight:1.5,cursor:task.done?'default':'text',padding:'3px 6px',background:'#fafaf7',borderRadius:5,border:'1px solid #f0ece6'}}>
                    {'Note: '+task.notes}
                  </div>
                : !task.done&&<button onClick={()=>{setNotesDraft('');setEditNotes(true);}} style={{fontSize:11,color:'#c4b5a0',background:'none',border:'none',cursor:'pointer',marginTop:2,padding:0}}>+ add note</button>
              }
            </div>
        }
        {due&&!task.done&&<div style={{fontSize:11,color:due.color,fontWeight:500,marginTop:3}}>{due.label}</div>}
      </div>
      <button className="del" onClick={()=>dispatch({type:'DELETE',id:task.id})} style={{opacity:0,width:19,height:19,borderRadius:5,flexShrink:0,cursor:'pointer',background:'#fee2e2',color:'#ef4444',border:'none',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',transition:'opacity .15s'}}>✕</button>
    </div>
  );
}

function AddForm({listId,list,dispatch,onClose}) {
  const [title,setTitle]=useState('');
  const [notes,setNotes]=useState('');
  const [due,setDue]=useState('');
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.focus();},[]);
  function submit(){
    const t=title.trim(); if(!t) return;
    dispatch({type:'ADD',task:{id:uid(),list:listId,title:t,notes:notes.trim(),done:false,due:due||null}});
    setTitle('');setNotes('');setDue('');onClose();
  }
  return (
    <div style={{background:list.bg,border:'1px solid '+list.color+'40',borderRadius:11,padding:'13px 15px',marginBottom:13}}>
      <input ref={ref} type="text" value={title} onChange={e=>setTitle(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter')submit();if(e.key==='Escape')onClose();}}
        placeholder="Task title..."
        style={{width:'100%',border:'none',borderBottom:'1px solid '+list.color+'60',background:'transparent',fontSize:14,color:'#1c1917',padding:'3px 0',marginBottom:8}}/>
      <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Notes (optional)..." rows={2}
        style={{width:'100%',border:'1px solid '+list.color+'40',borderRadius:6,background:'rgba(255,255,255,0.8)',fontSize:12,color:'#44403c',padding:'5px 8px',marginBottom:8,resize:'vertical'}}/>
      <div style={{display:'flex',alignItems:'center',gap:9}}>
        <input type="date" value={due} onChange={e=>setDue(e.target.value)}
          style={{border:'1px solid #ede9e3',borderRadius:5,padding:'3px 7px',fontSize:12,color:'#1c1917',background:'#fff'}}/>
        <div style={{marginLeft:'auto',display:'flex',gap:7}}>
          <button onClick={onClose} style={{padding:'4px 11px',borderRadius:7,border:'1px solid #ede9e3',background:'#fff',color:'#78716c',fontSize:12,cursor:'pointer'}}>Cancel</button>
          <button onClick={submit} style={{padding:'4px 13px',borderRadius:7,border:'none',background:list.color,color:'#fff',fontSize:12,fontWeight:500,cursor:'pointer'}}>Add</button>
        </div>
      </div>
    </div>
  );
}

function TaskPane({listId,tasks,dispatch}) {
  const [hideDone,setHideDone]=useState(false);
  const [adding,setAdding]=useState(false);
  const list=LISTS.find(l=>l.id===listId);
  const all=tasks.filter(t=>t.list===listId);
  const shown=hideDone?all.filter(t=>!t.done):all;
  const done=all.filter(t=>t.done).length;
  const pend=all.filter(t=>!t.done).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  return (
    <div className="fade">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:19}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          <div style={{width:38,height:38,borderRadius:10,background:list.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{list.icon}</div>
          <div>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:'#1c1917',lineHeight:1}}>{list.label}</h2>
            <div style={{fontSize:12,color:'#78716c',marginTop:2}}>{pend+' pending · '+done+' done'}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:7}}>
          {done>0&&<button onClick={()=>setHideDone(h=>!h)} style={{padding:'5px 13px',borderRadius:18,fontSize:12,cursor:'pointer',border:'1px solid #ede9e3',background:hideDone?list.color:'#fff',color:hideDone?'#fff':'#78716c'}}>
            {hideDone?'Show '+done+' done':'Hide '+done+' done'}
          </button>}
          <button onClick={()=>setAdding(a=>!a)} style={{padding:'5px 14px',borderRadius:18,fontSize:12,fontWeight:500,border:'none',background:list.color,color:'#fff',cursor:'pointer'}}>+ Add task</button>
        </div>
      </div>
      {adding&&<AddForm listId={listId} list={list} dispatch={dispatch} onClose={()=>setAdding(false)}/>}
      {shown.length===0
        ? <div style={{textAlign:'center',padding:'44px 0',color:'#a8a29e',fontSize:13}}>{hideDone?"All tasks hidden":"No tasks yet. Click '+ Add task' to start."}</div>
        : <div style={{display:'flex',flexDirection:'column',gap:6}}>{shown.map(t=><TaskRow key={t.id} task={t} dispatch={dispatch}/>)}</div>
      }
      {all.length>0&&(
        <div style={{marginTop:18}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#a8a29e',marginBottom:4}}>
            <span>Progress</span><span>{done+'/'+all.length}</span>
          </div>
          <div style={{height:4,background:'#ede9e3',borderRadius:2}}>
            <div style={{height:'100%',borderRadius:2,background:list.color,width:pct+'%',transition:'width .4s ease'}}/>
          </div>
        </div>
      )}
    </div>
  );
}

function TaskSidebar({tasks,activeList,setActiveList}) {
  const pending=tasks.filter(t=>!t.done).length;
  const overdue=tasks.filter(t=>{if(t.done||!t.due)return false;return new Date(t.due+'T23:59:59')<new Date();}).length;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:13}}>
      <div style={{background:'#1c1917',borderRadius:15,padding:'18px 16px',color:'#fafaf7'}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:700,marginBottom:13}}>My Tasks</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
          {[['Pending',pending,false],['Overdue',overdue,overdue>0],['Lists',LISTS.length,false],['Done',tasks.filter(t=>t.done).length,false]].map(([l,n,warn])=>(
            <div key={l} style={{background:'rgba(255,255,255,.07)',borderRadius:8,padding:'8px 10px'}}>
              <div style={{fontSize:18,fontWeight:600,color:warn?'#fca5a5':'#fafaf7'}}>{n}</div>
              <div style={{fontSize:10,color:'#a8a29e',textTransform:'uppercase',letterSpacing:'.5px'}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:13,border:'1px solid #ede9e3',padding:'12px 14px'}}>
        <div style={{fontSize:11,fontWeight:600,color:'#78716c',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:9}}>Task Lists</div>
        <div style={{display:'flex',flexDirection:'column',gap:3}}>
          {LISTS.map(list=>{
            const cnt=tasks.filter(t=>t.list===list.id&&!t.done).length;
            const active=activeList===list.id;
            return (
              <button key={list.id} onClick={()=>setActiveList(list.id)} style={{display:'flex',alignItems:'center',gap:9,padding:'7px 10px',borderRadius:9,textAlign:'left',cursor:'pointer',background:active?list.bg:'transparent',border:active?'1px solid '+list.color+'40':'1px solid transparent'}}>
                <div style={{width:26,height:26,borderRadius:7,fontSize:13,flexShrink:0,background:active?list.color:list.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>{list.icon}</div>
                <span style={{flex:1,fontSize:13,fontWeight:500,color:active?list.dark:'#44403c'}}>{list.label}</span>
                {cnt>0&&<span style={{fontSize:11,fontWeight:600,color:list.color,background:list.bg,borderRadius:9,padding:'1px 6px'}}>{cnt}</span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Export Overlay ─────────────────────────────────────────────────────────────
function ExportRow({label, value, color}) {
  return (
    <div style={{display:'flex',alignItems:'flex-start',gap:8,padding:'6px 10px',borderBottom:'1px solid #f5f3ee'}}>
      <span style={{color:color||'#a8a29e',flexShrink:0}}>{label}</span>
      <span style={{fontSize:13,color:'#1c1917'}}>{value}</span>
    </div>
  );
}

function ExportOverlay({events, tasks, onClose}) {
  var dateStr = new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // Group events by date
  var grouped = {};
  events.forEach(function(ev){
    var k = dateKey(ev.start);
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(ev);
  });
  var sortedDates = Object.keys(grouped).sort();

  var listIds = ['personal','kids','christmas','property','investment','work'];

  return (
    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.55)',zIndex:200,overflowY:'auto'}}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:'#fff',maxWidth:700,width:'100%',margin:'0 auto',minHeight:'100vh',padding:'22px 20px 48px'}}>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:13,borderBottom:'2px solid #1c1917',marginBottom:18}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:700}}>Momentum</div>
          <div style={{fontSize:11,color:'#78716c'}}>{dateStr}</div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:20}}>
          <button onClick={function(){window.print();}} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'#1c1917',color:'#fff',fontSize:13,fontWeight:500,cursor:'pointer'}}>
            Print / Save as PDF
          </button>
          <button onClick={onClose} style={{padding:'8px 13px',borderRadius:8,border:'1px solid #ede9e3',background:'#f5f3ee',color:'#78716c',fontSize:13,cursor:'pointer'}}>
            Close
          </button>
        </div>

        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,marginBottom:10,paddingBottom:5,borderBottom:'1px solid #ede9e3'}}>
          Calendar Events
        </div>
        {sortedDates.length === 0 && (
          <p style={{color:'#999',fontStyle:'italic',fontSize:13,marginBottom:20}}>No upcoming events.</p>
        )}
        {sortedDates.map(function(d){
          var evs = grouped[d];
          return (
            <div key={d} style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'#78716c',marginBottom:6}}>
                {fmtDayFull(d)}
              </div>
              {evs.map(function(ev){
                var c    = CAT[ev.cat] || CAT.personal;
                var t1   = fmtTime(ev.start);
                var t2   = fmtTime(ev.end);
                var time = ev.allDay ? 'All day' : (t1 + (t2 ? ' to ' + t2 : ''));
                return (
                  <div key={ev.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',border:'1px solid #ede9e3',borderRadius:7,marginBottom:5,background:'#fafaf7'}}>
                    <div style={{width:4,minWidth:4,height:28,borderRadius:2,background:c.color}}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:500,color:'#1c1917'}}>{ev.title}</div>
                      {ev.location ? <div style={{fontSize:11,color:'#78716c',marginTop:1}}>{ev.location}</div> : null}
                    </div>
                    <div style={{fontSize:11,color:'#78716c',textAlign:'right',flexShrink:0}}>{time}</div>
                  </div>
                );
              })}
            </div>
          );
        })}

        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,marginBottom:10,paddingBottom:5,borderBottom:'1px solid #ede9e3',marginTop:10}}>
          Tasks
        </div>
        {listIds.map(function(lid){
          var list  = LISTS.find(function(l){return l.id===lid;});
          if (!list) return null;
          var pend  = tasks.filter(function(t){return t.list===lid && !t.done;});
          var comp  = tasks.filter(function(t){return t.list===lid && t.done;});
          if (!pend.length && !comp.length) return null;
          return (
            <div key={lid} style={{marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:600,padding:'5px 10px',background:'#f5f3ee',borderLeft:'4px solid '+list.color,borderRadius:'0 7px 7px 0',marginBottom:6,display:'flex',justifyContent:'space-between'}}>
                <span>{list.icon + ' ' + list.label}</span>
                <span style={{fontSize:11,fontWeight:400,color:'#78716c'}}>{pend.length + ' pending'}</span>
              </div>
              {pend.map(function(t){
                var due = fmtDue(t.due);
                return (
                  <div key={t.id} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'6px 10px',borderBottom:'1px solid #f5f3ee'}}>
                    <span style={{color:'#a8a29e',flexShrink:0}}>○</span>
                    <div>
                      <div style={{fontSize:13,color:'#1c1917'}}>{t.title}</div>
                      {t.notes ? <div style={{fontSize:11,color:'#78716c',marginTop:1}}>{t.notes}</div> : null}
                      {due ? <div style={{fontSize:11,color:due.color,marginTop:1}}>{due.label}</div> : null}
                    </div>
                  </div>
                );
              })}
              {comp.length > 0 && (
                <div>
                  <div style={{fontSize:10,color:'#a8a29e',textTransform:'uppercase',letterSpacing:'.6px',margin:'8px 0 4px',paddingLeft:10}}>
                    {'Completed (' + comp.length + ')'}
                  </div>
                  {comp.map(function(t){
                    return (
                      <div key={t.id} style={{display:'flex',gap:8,padding:'5px 10px',borderBottom:'1px solid #f5f3ee',opacity:.5}}>
                        <span style={{color:'#a8a29e'}}>✓</span>
                        <div style={{fontSize:13,textDecoration:'line-through',color:'#1c1917'}}>{t.title}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}

        <div style={{marginTop:28,paddingTop:10,borderTop:'1px solid #ede9e3',fontSize:11,color:'#a8a29e',textAlign:'center'}}>
          Generated by Momentum
        </div>
      </div>
    </div>
  );
}

// ── Root App ───────────────────────────────────────────────────────────────────
function App() {
  const [showExport,setShowExport] = useState(false);
  const [screen,setScreen]         = useState(loadId()?'auth':'setup');


  const [clientId,setClientId]     = useState(loadId);
  const [events,setEvents]         = useState([]);
  const [loading,setLoading]       = useState(false);
  const [refreshing,setRefreshing] = useState(false);
  const [error,setError]           = useState('');
  const [tab,setTab]               = useState('calendar');
  const [activeList,setActiveList] = useState('personal');
  const [tasks,dispatch]           = useReducer(taskReducer,null,loadTasks);
  const tcRef    = useRef(null);

  useEffect(()=>{
    if(screen!=='auth'&&screen!=='app') return;
    const tryInit=()=>{
      if(!window.google?.accounts?.oauth2) return false;
      tcRef.current=window.google.accounts.oauth2.initTokenClient({
        client_id:clientId, scope:SCOPE, callback:handleToken,
      });
      if(screen==='auth'){setLoading(true);tcRef.current.requestAccessToken({prompt:''});}
      return true;
    };
    if(!tryInit()){
      const iv=setInterval(()=>{if(tryInit())clearInterval(iv);},200);
      return ()=>clearInterval(iv);
    }
  },[screen,clientId]);

  async function handleToken(resp) {
    if(resp.error){setError('Sign-in error: '+resp.error);setLoading(false);setRefreshing(false);return;}
    try {
      const evs=await fetchEvents(resp.access_token);
      setEvents(evs);setScreen('app');setError('');
    } catch(e){
      setError(e.message==='TOKEN_EXPIRED'?'Session expired. Reload page.':e.message);
    } finally {setLoading(false);setRefreshing(false);}
  }

  function refresh(){
    setRefreshing(true);setError('');
    if(tcRef.current) tcRef.current.requestAccessToken({prompt:''});
    else {setError('Auth not ready. Reload page.');setRefreshing(false);}
  }

  function saveClientId(id){saveId(id);setClientId(id);setScreen('auth');}
  function resetClientId(){clearId();setClientId('');setScreen('setup');}

  if(screen==='setup') return <SetupScreen onSave={saveClientId}/>;
  if(screen==='auth')  return <AuthScreen onReset={resetClientId} error={error}/>;

  return (
    <div style={{minHeight:'100vh',background:'#f5f3ee'}}>
      {showExport && <ExportOverlay events={events} tasks={tasks} onClose={()=>setShowExport(false)}/>}
      <div style={{background:'#fff',borderBottom:'1px solid #ede9e3',padding:'0 26px',height:54,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:10}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          <div style={{width:29,height:29,borderRadius:8,background:'linear-gradient(135deg,#1c1917,#44403c)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fafaf7'}}>◈</div>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:'#1c1917'}}>Momentum</span>
          <div style={{display:'flex',gap:2,marginLeft:10,background:'#f5f3ee',borderRadius:8,padding:3}}>
            {[['calendar','📅 Calendar'],['tasks','✓ Tasks']].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{padding:'4px 13px',borderRadius:6,fontSize:12,fontWeight:500,border:'none',cursor:'pointer',background:tab===k?'#fff':'transparent',color:tab===k?'#1c1917':'#78716c',boxShadow:tab===k?'0 1px 4px rgba(0,0,0,.08)':'none'}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <button onClick={()=>setShowExport(true)} style={{padding:'4px 12px',borderRadius:16,border:'1px solid #ede9e3',background:'#fff',color:'#78716c',fontSize:12,cursor:'pointer'}}>Export</button>
          <button onClick={resetClientId} style={{fontSize:11,color:'#a8a29e',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Sign out</button>
        </div>
      </div>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'26px'}}>
        {tab==='calendar'
          ? <CalendarView events={events} tasks={tasks} onRefresh={refresh} refreshing={refreshing}/>
          : <div style={{display:'grid',gridTemplateColumns:'1fr 260px',gap:22,alignItems:'start'}}>
              <TaskPane listId={activeList} tasks={tasks} dispatch={dispatch}/>
              <div style={{position:'sticky',top:72}}><TaskSidebar tasks={tasks} activeList={activeList} setActiveList={setActiveList}/></div>
            </div>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
