// ── Helpers ───────────────────────────────────────────────────────────────────
function detectCat(t) {
t = (t||’’).toLowerCase();
if (/flight|trip|travel|holiday/.test(t)) return ‘travel’;
if (/\bdr\b|\bgp\b|clinic|hospital|physio|\bpt\b|dentist|medical/.test(t)) return ‘health’;
if (/work|meeting|zoom|teams|conference|seminar|forum/.test(t)) return ‘work’;
if (/dinner|lunch|breakfast|party|birthday|drinks|coffee/.test(t)) return ‘social’;
return ‘personal’;
}
function dkey(iso) { iso=iso||’’; return iso.length===10?iso:iso.slice(0,10); }
function ftime(iso) {
if (!iso||iso.length===10) return ‘’;
try { return new Date(iso).toLocaleTimeString(‘en-AU’,{hour:‘numeric’,minute:‘2-digit’,hour12:true}); } catch(e){return ‘’;}
}
function fdayfull(iso) {
try { return new Date(iso+‘T12:00:00’).toLocaleDateString(‘en-AU’,{weekday:‘long’,day:‘numeric’,month:‘long’}); } catch(e){return iso;}
}
function fshort(d) {
try { return d.toLocaleDateString(‘en-AU’,{day:‘numeric’,month:‘short’}); } catch(e){return ‘’;}
}
function istoday(iso) { return iso===new Date().toISOString().slice(0,10); }
function fdue(iso) {
if (!iso) return null;
try {
var d=new Date(iso+‘T12:00:00’), t=new Date(); t.setHours(0,0,0,0);
var diff=Math.floor((d-t)/86400000);
if (diff<0)   return {label:‘Overdue’,      color:’#ef4444’};
if (diff===0) return {label:‘Due today’,    color:’#f59e0b’};
if (diff===1) return {label:‘Due tomorrow’, color:’#f59e0b’};
return {label:‘Due ‘+d.toLocaleDateString(‘en-AU’,{day:‘numeric’,month:‘short’}), color:’#78716c’};
} catch(e){return null;}
}
function weekRange(offset) {
var today=new Date(), dow=today.getDay();
var mon=new Date(today); mon.setDate(today.getDate()+(dow===0?-6:1-dow)+offset*7); mon.setHours(0,0,0,0);
var sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
return {start:mon, end:sun};
}
function weekDates(offset) {
var r=weekRange(offset), dates=[];
for (var i=0;i<7;i++) { var d=new Date(r.start); d.setDate(r.start.getDate()+i); dates.push(d.toISOString().slice(0,10)); }
return dates;
}
function filterWeek(evs,offset) {
var r=weekRange(offset);
return evs.filter(function(ev) {
try { var iso=ev.start, d=new Date(iso.length===10?iso+‘T00:00:00’:iso); return d>=r.start&&d<=r.end; } catch(e){return false;}
});
}
function getList(id) { for(var i=0;i<LISTS.length;i++){if(LISTS[i].id===id)return LISTS[i];} return LISTS[0]; }

// ── Storage ───────────────────────────────────────────────────────────────────
function saveId(id) {
try{localStorage.setItem(‘momentum_cid’,id);}catch(e){}
try{sessionStorage.setItem(‘momentum_cid’,id);}catch(e){}
try{document.cookie=‘mcid=’+encodeURIComponent(id)+’;max-age=31536000;path=/;SameSite=Lax’;}catch(e){}
}
function loadId() {
try{var v=localStorage.getItem(‘momentum_cid’);if(v)return v;}catch(e){}
try{var v=sessionStorage.getItem(‘momentum_cid’);if(v)return v;}catch(e){}
try{var m=document.cookie.match(/mcid=([^;]+)/);if(m)return decodeURIComponent(m[1]);}catch(e){}
return ‘’;
}
function clearId() {
try{localStorage.removeItem(‘momentum_cid’);}catch(e){}
try{sessionStorage.removeItem(‘momentum_cid’);}catch(e){}
try{document.cookie=‘mcid=;max-age=0;path=/’;}catch(e){}
}
function saveTasks(t) { try{localStorage.setItem(‘momentum_tasks’,JSON.stringify(t));}catch(e){} }
function loadTasks() { try{return JSON.parse(localStorage.getItem(‘momentum_tasks’)||’[]’);}catch(e){return [];} }

// ── Task Reducer ──────────────────────────────────────────────────────────────
var _tid=1000;
function uid(){return String(++_tid);}
function taskReducer(tasks,action) {
var next;
if      (action.type===‘TOGGLE’)     next=tasks.map(function(t){return t.id===action.id?Object.assign({},t,{done:!t.done}):t;});
else if (action.type===‘DELETE’)     next=tasks.filter(function(t){return t.id!==action.id;});
else if (action.type===‘ADD’)        next=tasks.concat([action.task]);
else if (action.type===‘EDIT’)       next=tasks.map(function(t){return t.id===action.id?Object.assign({},t,{title:action.title}):t;});
else if (action.type===‘EDIT_NOTES’) next=tasks.map(function(t){return t.id===action.id?Object.assign({},t,{notes:action.notes}):t;});
else next=tasks;
saveTasks(next);
return next;
}

// ── Calendar API ──────────────────────────────────────────────────────────────
async function fetchCal(token) {
var now=new Date(), end=new Date(now.getTime()+28*24*3600000);
var p=new URLSearchParams({timeMin:now.toISOString(),timeMax:end.toISOString(),singleEvents:‘true’,orderBy:‘startTime’,maxResults:‘100’});
var ctrl=new AbortController();
var timer=setTimeout(function(){ctrl.abort();},10000);
try {
var res=await fetch(CAL_API+’?’+p,{headers:{Authorization:‘Bearer ‘+token},signal:ctrl.signal});
clearTimeout(timer);
if (res.status===401) throw new Error(‘TOKEN_EXPIRED’);
if (!res.ok) throw new Error(‘Calendar error ‘+res.status);
var data=await res.json();
return (data.items||[]).map(function(item){
return {id:item.id, title:item.summary||‘Untitled’,
start:(item.start&&(item.start.dateTime||item.start.date))||’’,
end:(item.end&&(item.end.dateTime||item.end.date))||’’,
allDay:!(item.start&&item.start.dateTime), location:item.location||’’, cat:detectCat(item.summary||’’)};
});
} catch(e){clearTimeout(timer); if(e.name===‘AbortError’) throw new Error(‘Request timed out.’); throw e;}
}

<div style={{display:‘flex’,gap:‘2px’,marginLeft:‘10px’,background:’#f5f3ee’,borderRadius:‘8px’,padding:‘3px’}}>
{[[‘calendar’,‘📅 Calendar’],[‘tasks’,‘✓ Tasks’]].map(function(p){
var active=tab===p[0];
return <button key={p[0]} onClick={function(){setTab(p[0]);}} style={{padding:‘4px 12px’,borderRadius:‘6px’,fontSize:‘12px’,fontWeight:‘500’,border:‘none’,cursor:‘pointer’,background:active?’#fff’:‘transparent’,color:active?’#1c1917’:’#78716c’,boxShadow:active?‘0 1px 4px rgba(0,0,0,.07)’:‘none’}}>{p[1]}</button>;
})}
</div>
</div>
<div style={{display:‘flex’,alignItems:‘center’,gap:‘9px’}}>
<button onClick={function(){setShowExport(true);}} style={{padding:‘4px 12px’,borderRadius:‘16px’,border:‘1px solid #ede9e3’,background:’#fff’,color:’#78716c’,fontSize:‘12px’,cursor:‘pointer’}}>Export</button>
<button onClick={doReset} style={{fontSize:‘11px’,color:’#a8a29e’,background:‘none’,border:‘none’,cursor:‘pointer’,textDecoration:‘underline’}}>Sign out</button>
</div>
</div>
<div style={{maxWidth:‘1100px’,margin:‘0 auto’,padding:‘24px’}}>
{tab===‘calendar’
? <CalendarView events={events} tasks={tasks} onRefresh={refresh} refreshing={refreshing} />
: <div style={{display:‘grid’,gridTemplateColumns:‘1fr 260px’,gap:‘22px’,alignItems:‘start’}}>
<TaskPane listId={activeList} tasks={tasks} dispatch={dispatch} />
<div style={{position:‘sticky’,top:‘70px’}}><TaskSidebar tasks={tasks} activeList={activeList} setActive={setActiveList} /></div>
</div>
}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(React.createElement(App,null));
</script>

</body>
</html>
